version: "3.8"

services:
  # 1. Managed Database (Defang provisions a fully managed cloud Postgres)
  db:
    image: postgres:16-alpine
    x-defang-postgres: true
    environment:
      POSTGRES_DB: uddoktar_dokan
      POSTGRES_USER: uddoktar
      POSTGRES_PASSWORD: 

  # 2. Managed Redis (Defang provisions a managed cloud Redis)
  redis:
    image: redis:7-alpine
    x-defang-redis: true

# 3. Your Core Django Application
  web:
    build: .
    # Temporary command to create the admin user on startup
    command: sh -c "python manage.py migrate --noinput && python -c \"from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').delete(); User.objects.create_superuser('admin', 'admin@uddoktardokan.com', 'YourSecurePassword123!')\" && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DJANGO_SECRET_KEY: 
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_CSRF_TRUSTED_ORIGINS: https://uddoktardokan.com
      DATABASE_URL: postgres://uddoktar:${POSTGRES_PASSWORD}@db:5432/uddoktar_dokan
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - media_data:/app/media  # Keeps your banners and images saved permanently
    depends_on:
      - db
      - redis
    x-defang:
      healthcheck:
        # Replaced curl with a built-in Python command so it doesn't fail if curl isn't installed
        test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000', timeout=5)"]
        interval: 15s
        timeout: 5s
        retries: 3

  # 4. Celery Background Worker
  celery:
    build: .
    command: celery -A config worker -l info
    environment:
      DJANGO_SECRET_KEY: 
      DJANGO_DEBUG: "False"
      DATABASE_URL: postgres://uddoktar:${POSTGRES_PASSWORD}@db:5432/uddoktar_dokan
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - media_data:/app/media  # Connects Celery worker to the same images folder
    depends_on:
      - db
      - redis

# Named volume declaration for persistent storage
volumes:
  media_data:
