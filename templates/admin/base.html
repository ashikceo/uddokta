{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
<link rel="stylesheet" href="{% static 'css/admin-responsive.css' %}">
<style>
/* Admin notification banner */
.admin-banner {
  background: linear-gradient(135deg, #e74847 0%, #cb3231 100%);
  color: #fff;
  text-align: center;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.3px;
  display: none;
}
.admin-banner a {
  color: #fff;
  text-decoration: underline;
  font-weight: 600;
}
.admin-banner .close-banner {
  float: right;
  cursor: pointer;
  opacity: 0.8;
  font-size: 16px;
  margin-left: 10px;
}
.admin-banner .close-banner:hover { opacity: 1; }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var banner = document.getElementById('adminBanner');
  if (banner && localStorage.getItem('adminBannerClosed') !== 'true') {
    banner.style.display = 'block';
  }
});
function closeBanner() {
  document.getElementById('adminBanner').style.display = 'none';
  localStorage.setItem('adminBannerClosed', 'true');
}
</script>
{% endblock %}

{% block nav-global %}
<div id="adminBanner" class="admin-banner">
  <span class="close-banner" onclick="closeBanner()">&times;</span>
  <i class="fa fa-bullhorn" style="margin-right:6px;"></i>
  {% if admin_banner_message %}
    {{ admin_banner_message|safe }}
  {% else %}
    Welcome to <strong>Uddoktar Dokan</strong> Admin Panel
  {% endif %}
</div>
{% endblock %}
