    (function() {
        var fieldset = document.querySelector('.bd-address-picker');
        if (!fieldset) return;

        var streetRow = fieldset.querySelector('.form-row.field-address_street');
        var divRow = fieldset.querySelector('.form-row.field-address_division');
        var distRow = fieldset.querySelector('.form-row.field-address_district');
        var upzRow = fieldset.querySelector('.form-row.field-address_upazila');
        if (!divRow || !distRow || !upzRow) return;

        var divInput = divRow.querySelector('input');
        var distInput = distRow.querySelector('input');
        var upzInput = upzRow.querySelector('input');

        var wrapper = document.createElement('div');
        wrapper.style.cssText = 'padding:8px 0 0;';

        function makeGroup(labelText, options, currentVal) {
            var group = document.createElement('div');
            group.style.cssText = 'margin-bottom:14px;';
            var label = document.createElement('label');
            label.textContent = labelText;
            label.style.cssText = 'display:block;margin-bottom:4px;font-weight:600;color:#555;font-size:11.5px;text-transform:uppercase;letter-spacing:0.3px;';
            var select = document.createElement('select');
            select.style.cssText = 'width:100%;padding:9px 10px;font-size:14px;border:1px solid #ccc;border-radius:4px;background:#fff;box-sizing:border-box;';
            var ph = document.createElement('option');
            ph.value = '';
            ph.textContent = '-- Choose ' + labelText + ' --';
            ph.disabled = true;
            ph.selected = true;
            select.appendChild(ph);
            options.forEach(function(o) {
                var opt = document.createElement('option');
                opt.value = o;
                opt.textContent = o;
                if (o === currentVal) opt.selected = true;
                select.appendChild(opt);
            });
            group.appendChild(label);
            group.appendChild(select);
            return group;
        }

        var divVal = divInput ? divInput.value : '';
        var distVal = distInput ? distInput.value : '';
        var upzVal = upzInput ? upzInput.value : '';

        var divGroup = makeGroup('Division', Object.keys(ADMIN_BD_DATA), divVal);
        var distGroup = makeGroup('District', [], distVal);
        var upzGroup = makeGroup('Upazila', [], upzVal);

        var divSel = divGroup.querySelector('select');
        var distSel = distGroup.querySelector('select');
        var upzSel = upzGroup.querySelector('select');

        function populateDistricts() {
            distSel.innerHTML = '<option value="" disabled selected>-- Choose District --</option>';
            upzSel.innerHTML = '<option value="" disabled selected>-- Choose Upazila --</option>';
            upzSel.disabled = true;
            if (divSel.value && ADMIN_BD_DATA[divSel.value]) {
                Object.keys(ADMIN_BD_DATA[divSel.value]).forEach(function(d) {
                    var opt = document.createElement('option');
                    opt.value = d;
                    opt.textContent = d;
                    if (d === distVal) opt.selected = true;
                    distSel.appendChild(opt);
                });
                distSel.disabled = false;
            } else {
                distSel.disabled = true;
            }
        }

        function populateUpazilas() {
            upzSel.innerHTML = '<option value="" disabled selected>-- Choose Upazila --</option>';
            if (divSel.value && distSel.value && ADMIN_BD_DATA[divSel.value] && ADMIN_BD_DATA[divSel.value][distSel.value]) {
                ADMIN_BD_DATA[divSel.value][distSel.value].forEach(function(u) {
                    var opt = document.createElement('option');
                    opt.value = u;
                    opt.textContent = u;
                    if (u === upzVal) opt.selected = true;
                    upzSel.appendChild(opt);
                });
                upzSel.disabled = false;
            } else {
                upzSel.disabled = true;
            }
        }

        if (divVal) populateDistricts();
        if (divVal && distVal) populateUpazilas();

        divSel.addEventListener('change', function() {
            if (divInput) divInput.value = this.value;
            distVal = '';
            upzVal = '';
            if (distInput) distInput.value = '';
            if (upzInput) upzInput.value = '';
            populateDistricts();
        });

        distSel.addEventListener('change', function() {
            if (distInput) distInput.value = this.value;
            upzVal = '';
            if (upzInput) upzInput.value = '';
            populateUpazilas();
        });

        upzSel.addEventListener('change', function() {
            if (upzInput) upzInput.value = this.value;
        });

        wrapper.appendChild(divGroup);
        wrapper.appendChild(distGroup);
        wrapper.appendChild(upzGroup);

        if (streetRow) {
            streetRow.parentNode.insertBefore(wrapper, streetRow.nextSibling);
        } else {
            var firstRow = fieldset.querySelector('.form-row');
            if (firstRow) {
                firstRow.parentNode.insertBefore(wrapper, firstRow.nextSibling);
            } else {
                fieldset.appendChild(wrapper);
            }
        }
    })();
})();
</script>
