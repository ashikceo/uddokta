{% extends 'base.html' %}
{% load static %}

{% block title %}Become a Seller - Uddoktar Dokan{% endblock %}

{% block content %}
<div class="container page-content">
    <div class="breadcrumb">
        <a href="{% url 'home' %}">Home</a> / <a href="{% url 'dashboard' %}">Dashboard</a> / <span>Become a Seller</span>
    </div>
    <div class="auth-form">
        <h1>Become a Seller</h1>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Shop/Partner Name *</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Register as Seller</button>
        </form>
    </div>
</div>
{% endblock %}
