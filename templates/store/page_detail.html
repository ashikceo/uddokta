{% extends 'base.html' %}
{% load static %}

{% block title %}{{ page.title }} - Uddoktar Dokan{% endblock %}

{% block content %}
<div class="container page-content" style="padding:40px 0; min-height:50vh;">
    <div class="breadcrumb">
        <a href="{% url 'home' %}">Home</a> / <span>{{ page.title }}</span>
    </div>
    <h1 style="border-bottom:2px solid #e74847; padding-bottom:10px; margin:20px 0;">{{ page.title }}</h1>
    <div style="line-height:1.8; font-size:15px;">{{ page.content|safe }}</div>
</div>
{% endblock %}
