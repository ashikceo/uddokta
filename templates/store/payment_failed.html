{% extends 'base.html' %}
{% load static %}

{% block title %}Payment Failed{% endblock %}

{% block content %}
<div style="text-align:center;padding:60px 20px;">
    <div style="width:80px;height:80px;background:#f44336;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <span style="color:#fff;font-size:40px;">✕</span>
    </div>
    <h2>Payment Failed</h2>
    <p style="color:#666;margin:20px 0;">Your payment could not be processed. Please try again.</p>
    <a href="{% url 'payment_init' order.id %}" style="display:inline-block;padding:12px 30px;background:#e74847;color:#fff;text-decoration:none;border-radius:4px;">Try Again</a>
    <a href="{% url 'dashboard' %}" style="display:inline-block;padding:12px 30px;background:#666;color:#fff;text-decoration:none;border-radius:4px;margin-left:10px;">My Dashboard</a>
</div>
{% endblock %}
